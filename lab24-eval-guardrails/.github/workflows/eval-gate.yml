name: RAG Eval Gate

on:
  pull_request:
    branches: [ main ]

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download spacy model
        run: python -m spacy download en_core_web_lg

      - name: Run RAGAS evaluation
        run: python scripts/run_eval.py --threshold faithfulness=0.70 --threshold answer_relevancy=0.65 --threshold context_precision=0.60 --threshold context_recall=0.65
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ragas-report
          path: |
            phase-a/ragas_results.csv
            phase-a/ragas_summary.json
